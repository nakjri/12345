<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Семинар</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #f9f4e6 0%, #f5efe0 100%);
            color: #5a4a42;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 40px 20px;
            position: relative;
        }
        .header::before {
            content: "✿";
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            color: #b89e87;
        }
        .header::after {
            content: "✿";
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            color: #b89e87;
        }
        h1 {
            font-size: 36px;
            color: #8b6b5b;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .greeting {
            font-size: 28px;
            font-weight: bold;
            color: #7a5a48;
            text-align: center;
            margin: 60px 0 30px;
            position: relative;
        }
        .greeting::before,
        .greeting::after {
            content: "❀";
            display: inline-block;
            margin: 0 15px;
            color: #c9b4a1;
        }
        .instruction {
            font-size: 20px;
            text-align: center;
            margin-bottom: 40px;
            color: #6a554a;
            line-height: 1.5;
        }
        .btn {
            display: block;
            width: 250px;
            margin: 0 auto;
            padding: 18px 30px;
            background: linear-gradient(to bottom, #b89e87, #a68a77);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(184, 158, 135, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(45deg);
            transition: all 0.5s;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(184, 158, 135, 0.4);
        }
        .btn:hover::before {
            left: 150%;
        }
        footer {
            text-align: center;
            padding: 20px;
            color: #8b6b5b;
            font-size: 14px;
            border-top: 1px solid #d9c9b8;
            margin-top: 60px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>привет-привет ^^</h1>
        </header>
        <main>
            <p class="greeting">рады видеть на семинаре :)</p>
            <p class="instruction">Чтобы продолжить, нажми кнопку</p>
            <a href="task.html" class="btn">Перейти к заданию</a>
        </main>
        <footer>
            © 2026 
        </footer>
    </div>
</body>
</html>
